<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن | AutoCollo DZ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        h1 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        /* جعل الجدول متجاوباً على الهواتف والشاشات الصغيرة */
        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; background: #1e293b; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #334155; white-space: nowrap; }
        th { background-color: #0284c7; color: white; }
        tr:hover { background-color: #334155; }
        
        /* تنسيق أزرار العمليات */
        .btn-action { color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; font-size: 13px; transition: background 0.2s; }
        .btn-activate { background: #10b981; }
        .btn-activate:hover { background: #059669; }
        .btn-deactivate { background: #f97316; }
        .btn-deactivate:hover { background: #ea580c; }
        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #dc2626; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #d97706; color: white; }
        .status-active { background: #10b981; color: white; }
    </style>
</head>
<body>

    <h1> لوحة تحكم الأدمن  - إدارة تفعيلات بريدي موب</h1>
    <p>هنا تجد قائمة المستخدمين الذين سجلوا وقاموا بإدخال رقم المعاملة للتحقق:</p>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الاسم الكامل</th>
                    <th>البريد الإلكتروني</th>
                    <th>رقم معاملة بريدي موب</th>
                    <th>الحالة الحالية</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
    </div>

    <script>
        const API_BASE_URL = "https://autocollo-api.onrender.com";

        // دالة لجلب المستخدمين من السيرفر وعرضهم في الجدول بأمان
        async function fetchUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = "<tr><td colspan='5'>⏳ جاري جلب البيانات من السيرفر...</td></tr>";

            try {
                const response = await fetch(`${API_BASE_URL}/admin/users`);
                if (!response.ok) throw new Error("فشل الاتصال");
                
                const users = await response.json();
                tbody.innerHTML = ""; 

                if(!users || users.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>❌ لا يوجد أي مستخدم مسجل حالياً في القاعدة.</td></tr>";
                    return;
                }

                // بناء الجدول بأسلوب أمني يمنع ثغرات XSS
                users.forEach((user, index) => {
                    const tr = document.createElement('tr');
                    
                    const statusClass = user.status === 'active' ? 'status-active' : 'status-pending';
                    const statusText = user.status === 'active' ? 'مفعّل ونشط' : 'قيد الانتظار';

                    // تحضير خلايا الصف مع إعطائها معرفات فريدة لحقن البيانات نصياً لاحقاً
                    tr.innerHTML = `
                        <td id="user-name-${index}"></td>
                        <td id="user-email-${index}"></td>
                        <td id="user-tx-${index}" style="color:#38bdf8; font-weight:bold; font-family:monospace;"></td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td id="user-actions-${index}"></td>
                    `;
                    tbody.appendChild(tr);

                    // حقن النصوص بأمان تام كـ Text
                    document.getElementById(`user-name-${index}`).textContent = user.name;
                    document.getElementById(`user-email-${index}`).textContent = user.email;
                    document.getElementById(`user-tx-${index}`).textContent = user.transaction_id;

                    // بناء وحقن أزرار التحكم والعمليات ديناميكياً
                    const actionsCell = document.getElementById(`user-actions-${index}`);
                    
                    const actBtn = document.createElement('button');
                    actBtn.className = `btn-action ${user.status === 'pending' ? 'btn-activate' : 'btn-deactivate'}`;
                    actBtn.textContent = user.status === 'pending' ? '✅ تفعيل' : '⚠️ إلغاء التفعيل';
                    actBtn.addEventListener('click', () => {
                        if (user.status === 'pending') {
                            window.activateUser(user.email);
                        } else {
                            window.deactivateUser(user.email);
                        }
                    });
                    
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn-action btn-delete';
                    delBtn.textContent = '🗑️ حذف';
                    delBtn.addEventListener('click', () => window.deleteUser(user.email));

                    actionsCell.appendChild(actBtn);
                    actionsCell.appendChild(delBtn);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = "<tr><td colspan='5' style='color:#ef4444; text-align:center;'>❌ فشل الاتصال بالسيرفر! تأكد أن السيرفر شغال.</td></tr>";
            }
        }

        // دالة تفعيل المستخدم
        async function activateUser(email) {
            if(!confirm(`هل أنت متأكد من تفعيل الحساب ذو الإيميل: ${email}؟`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/admin/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if(response.ok) {
                    alert("🚀 تم تفعيل الحساب بنجاح والمحاكي متاح له الآن!");
                    fetchUsers(); 
                } else {
                    alert("❌ حدث خطأ أثناء التفعيل.");
                }
            } catch (err) {
                alert("❌ خطأ في الاتصال بالسيرفر.");
            }
        }

        // دالة إلغاء تفعيل المستخدم
        async function deactivateUser(email) {
            if(!confirm(`هل أنت متأكد من إلغاء تفعيل الحساب: ${email}؟`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/admin/deactivate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if(response.ok) {
                    alert("⚠️ تم إلغاء تفعيل الحساب بنجاح.");
                    fetchUsers(); 
                } else {
                    alert("❌ حدث خطأ أثناء إلغاء التفعيل.");
                }
            } catch (err) {
                alert("❌ خطأ في الاتصال بالسيرفر.");
            }
        }

        // دالة حذف المستخدم نهائياً
        async function deleteUser(email) {
            if(!confirm(`⚠️ تحذير: هل أنت متأكد تماماً من حذف هذا الحساب نهائياً (${email})؟ لا يمكن التراجع عن هذا الإجراء.`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/admin/delete`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if(response.ok) {
                    alert("🗑️ تم حذف المستخدم بنجاح من قاعدة البيانات.");
                    fetchUsers(); 
                } else {
                    alert("❌ حدث خطأ أثناء محاولة الحذف.");
                }
            } catch (err) {
                alert("❌ خطأ في الاتصال بالسيرفر.");
            }
        }

        // ربط الدوال بنطاق الـ Window
        window.activateUser = activateUser;
        window.deactivateUser = deactivateUser;
        window.deleteUser = deleteUser;

        // تشغيل الجلب تلقائياً عند فتح الصفحة
        document.addEventListener("DOMContentLoaded", fetchUsers);
    </script>
</body>
</html>
